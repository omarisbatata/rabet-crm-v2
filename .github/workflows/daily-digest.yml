name: Daily follow-up digest

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 09:00 Damascus (Syria doesn't observe DST)
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sync
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: node daily-digest.mjs
        env:
          GMAIL_USER: shalakomar9@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUPABASE_URL: https://jpzplchcwtpihxfqdrlo.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DIGEST_TO: oshalak@hotmail.com
